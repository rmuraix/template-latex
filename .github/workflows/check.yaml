name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      projects: ${{ steps.changes.outputs.projects }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed projects
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          else
            BEFORE="${{ github.event.before }}"
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED=$(git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD)
            else
              CHANGED=$(git diff --name-only "$BEFORE" HEAD)
            fi
          fi

          ALL_PROJECTS=$(find projects -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)

          if echo "$CHANGED" | grep -qE "^(shared/|\.latexmkrc$)"; then
            AFFECTED="$ALL_PROJECTS"
          else
            AFFECTED=$(echo "$CHANGED" | grep "^projects/" | sed 's|projects/\([^/]*\)/.*|\1|' | sort -u)
          fi

          if [ -z "$AFFECTED" ]; then
            echo "projects=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(echo "$AFFECTED" | jq -Rcs 'split("\n") | map(select(length > 0))')
            echo "projects=$JSON" >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - name: Build LaTeX document
        uses: devcontainers/ci@v0.3
        with:
          runCmd: cd projects/${{ matrix.project }} && latexmk -r ../../.latexmkrc main.tex
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}
          path: projects/${{ matrix.project }}/out/main.pdf
  comment:
    needs: [detect-changes, build]
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post PDF URLs in PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            if (artifacts.length === 0) {
              return;
            }

            const lines = artifacts.map(artifact => {
              const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`;
              return `- [${artifact.name}](${url})`;
            });

            const marker = '<!-- pdf-artifacts-comment -->';
            const body = `${marker}\n## 📄 Built PDFs\n\n${lines.join('\n')}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
